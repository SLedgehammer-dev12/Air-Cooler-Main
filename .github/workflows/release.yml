name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    name: Build Packages
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
        include:
          - os: windows-latest
            artifact_name: AirCooler_Main.exe
            asset_name: AirCooler_Main-v3.7.0-windows-x64.zip
          - os: macos-latest
            artifact_name: AirCooler_Main
            asset_name: AirCooler_Main-v3.7.0-macos-arm64.dmg
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller fluids ht scipy Pint pandas numpy plotly

      - name: Build with PyInstaller
        run: |
          pyinstaller --clean --noconfirm air_cooler_main.spec

      - name: Compress Windows Build
        if: matrix.os == 'windows-latest'
        run: |
          powershell Compress-Archive -Path dist/AirCooler_Main/* -DestinationPath dist/${{ matrix.asset_name }}

      - name: Create macOS DMG
        if: matrix.os == 'macos-latest'
        run: |
          hdiutil create -volname "Air Cooler Main" -srcfolder dist/AirCooler_Main -ov -format UDZO dist/${{ matrix.asset_name }}

      - name: Upload Release Assets
        uses: softprops/action-gh-release@v2
        with:
          body_path: RELEASE_NOTES.md
          files: |
            dist/*.zip
            dist/*.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
